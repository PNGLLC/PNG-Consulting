<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reggie Robinson | PNG Solutions LLC</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📇</text></svg>">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #1B3A5F;
            --navy-dark: #0F2640;
            --light-blue: #4A90A4;
            --accent: #2ED573;
            --white: #FFFFFF;
            --off-white: #F8FAFC;
            --gray: #64748B;
            --light-gray: #E2E8F0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, var(--navy-dark) 0%, var(--navy) 50%, #1e4a6f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(74, 144, 164, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: pulse 8s ease-in-out infinite;
        }
        
        .bg-pattern::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(46, 213, 115, 0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse 6s ease-in-out infinite reverse;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        /* Card Container */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Header Section */
        .card-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
            padding: 32px 24px 80px;
            text-align: center;
            position: relative;
        }
        
        .card-header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--white);
            border-radius: 50% 50% 0 0;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid rgba(46, 213, 115, 0.4);
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }
        
        .badge::before {
            content: '★';
            font-size: 0.6rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Profile Photo */
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--navy) 100%);
            margin: 0 auto 16px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--white);
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 -2px 8px rgba(0, 0, 0, 0.2);
            animation: scaleIn 0.5s ease-out 0.1s both;
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .profile-photo::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }
        
        .title {
            font-size: 0.95rem;
            color: var(--light-blue);
            font-weight: 500;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }
        
        /* Body Section */
        .card-body {
            padding: 20px 24px 24px;
        }
        
        /* Company Branding */
        .company-block {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }
        
        .company-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 4px;
        }
        
        .tagline {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 500;
        }
        
        /* Contact Buttons */
        .contact-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .contact-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--off-white);
            border: 1px solid var(--light-gray);
            border-radius: 14px;
            text-decoration: none;
            color: var(--navy);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            animation: slideIn 0.5s ease-out both;
        }
        
        .contact-btn:nth-child(1) { animation-delay: 0.6s; }
        .contact-btn:nth-child(2) { animation-delay: 0.7s; }
        .contact-btn:nth-child(3) { animation-delay: 0.8s; }
        .contact-btn:nth-child(4) { animation-delay: 0.9s; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .contact-btn:hover, .contact-btn:active {
            background: var(--navy);
            color: var(--white);
            border-color: var(--navy);
            transform: translateX(4px);
        }
        
        .contact-btn:hover .icon, .contact-btn:active .icon {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
        }
        
        .icon {
            width: 40px;
            height: 40px;
            background: var(--navy);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        
        .icon svg {
            width: 20px;
            height: 20px;
            fill: var(--white);
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
        }
        
        .contact-label {
            font-size: 0.7rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .contact-value {
            font-weight: 600;
        }
        
        /* Social Links */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out 1s both;
        }
        
        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--off-white);
            border: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        
        .social-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--navy);
            transition: fill 0.25s ease;
        }
        
        .social-btn:hover {
            background: var(--navy);
            border-color: var(--navy);
            transform: translateY(-3px);
        }
        
        .social-btn:hover svg {
            fill: var(--white);
        }
        
        /* CTA Buttons */
        .cta-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            animation: fadeIn 0.6s ease-out 1.1s both;
        }
        
        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s ease;
            text-align: center;
        }
        
        .cta-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #26b863 100%);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.3);
        }
        
        .cta-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4);
        }
        
        .cta-secondary {
            background: var(--navy);
            color: var(--white);
        }
        
        .cta-secondary:hover {
            background: var(--navy-dark);
            transform: translateY(-2px);
        }
        
        .cta-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        
        /* Footer */
        .card-footer {
            text-align: center;
            padding: 16px 24px 20px;
            border-top: 1px solid var(--light-gray);
            animation: fadeIn 0.6s ease-out 1.2s both;
        }
        
        .location {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--gray);
            font-size: 0.85rem;
        }
        
        .location svg {
            width: 16px;
            height: 16px;
            fill: var(--light-blue);
        }
        
        /* Industries */
        .industries {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .industry-tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            background: rgba(74, 144, 164, 0.1);
            color: var(--light-blue);
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 380px) {
            .card {
                border-radius: 20px;
            }
            
            .card-header {
                padding: 24px 20px 70px;
            }
            
            .name {
                font-size: 1.5rem;
            }
            
            .card-body {
                padding: 16px 20px 20px;
            }
            
            .cta-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // Generate vCard and trigger download

            e.preventDefault();
            
            const vCard = `BEGIN:VCARD
VERSION:3.0
FN:Reggie Robinson
N:Robinson;Reggie;;;
ORG:PNG Solutions LLC
TITLE:Founder & CEO
TEL;TYPE=WORK,VOICE:+12627217412
EMAIL;TYPE=WORK:info@pngsolutionsllc.com
URL:https://pngsolutionsllc.com
URL;TYPE=LinkedIn:https://www.linkedin.com/in/pngsolutionsllc/
ADR;TYPE=WORK:;;San Antonio;Texas;;USA
NOTE:Service-Disabled Veteran-Owned Small Business (SDVOSB) - Consulting, automation, and AI solutions for small businesses.
END:VCARD`;
            
            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Reggie_Robinson_PNG_Solutions.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            // Visual feedback
            this.innerHTML = `
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                Saved!
            `;

            setTimeout(() => {
